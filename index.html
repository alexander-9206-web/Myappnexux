<html lang="es">

        @media print {
            body { background: white !important; font-size: 11px !important; }
            .print\:hidden { display: none !important; }

            .shadow-sm, .shadow-md, .shadow-lg, .shadow-2xl { box-shadow: none !important; }

            #app-root { height: auto !important; overflow: visible !important; }
            main { padding: 0 !important; overflow: visible !important; }
            .print-page-break { page-break-before: always; margin-top: 20px; padding-top: 20px; border-top: 1px solid #ccc; }
            .table-scroll { overflow: visible !important; }
            table { width: 100% !important; table-layout: fixed !important; border-collapse: collapse !important; }
            th, td { white-space: normal !important; word-wrap: break-word !important; padding: 4px !important; font-size: 9px !important; }
            .min-w-[400px], .min-w-[650px], .min-w-[700px], .min-w-[900px], .min-w-[1200px] { min-width: 0 !important; width: 100% !important; }
        }

</head>
<body class="flex flex-col h-screen bg-slate-50 font-sans overflow-hidden text-slate-800">

    <div id="app-root" class="flex flex-col h-full w-full relative"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

/**
 * ==========================================
 * 1. CONFIGURACIÓN FIREBASE 
 * ==========================================
 */
const fallbackConfig = {
    apiKey: "AIzaSyBLbvNxeF7SqjZ4tRSDH0O2BvIVrIuG764",
    authDomain: "nexus-jr.firebaseapp.com",
    projectId: "nexus-jr",
    storageBucket: "nexus-jr.firebasestorage.app",
    messagingSenderId: "273022472068",
    appId: "1:273022472068:web:74cf3c09e664d2a9f2d7d1"
};

const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : fallbackConfig;
const appIdStr = typeof __app_id !== 'undefined' ? __app_id : "don-sebe-erp";

let auth = null;
let db = null;
window.isFirebaseReady = false;
let currentUser = null;
window.activeFirebaseListeners = [];
window.hasLoadedFromCloud = {}; 

try {
    const app = initializeApp(firebaseConfig);
    auth = getAuth(app);
    db = getFirestore(app);
    window.isFirebaseReady = true;
} catch (error) {
    console.error("🔥 Error inicializando Firebase:", error);
}

/**
 * ==========================================
 * 2. MOTOR HÍBRIDO DE DATOS (DELTA SYNC)
 * ==========================================
 */
window.dbHelper = {
    save: async (colName, id, data) => {
        const idx = App.state[colName].findIndex(x => x.id === id);
        if(idx !== -1) App.state[colName][idx] = { ...App.state[colName][idx], ...data };
        else App.state[colName].push({ id, ...data });

        if (window.isFirebaseReady && currentUser && navigator.onLine) {
            try {
                await setDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', colName, id.toString()), data, { merge: true });
            } catch(e) {
                if(!App.state.syncQueue.find(x => x.colName === colName && x.id === id)) App.state.syncQueue.push({colName, id, data});
            }
        } else {
            if(!App.state.syncQueue.find(x => x.colName === colName && x.id === id)) App.state.syncQueue.push({colName, id, data});
        }
        window.App.render();
    },
    remove: async (colName, id) => {
        if (window.isFirebaseReady && currentUser) {
            await deleteDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', colName, id.toString()));
        } else {
            App.state[colName] = App.state[colName].filter(x => x.id !== id);
            window.App.render();
        }
    }
};

window.formatCOP = (value) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(value || 0);

// BUSCADOR EXACTO PARA RELACIÓN CLIENTE-VIAJE
window.exactMatch = (str, target) => {
    if(!str || !target) return false;
    return str.split(',').map(x=>x.trim().toLowerCase()).includes(target.toLowerCase());
};

/**
 * ==========================================
 * 3. DATOS SEMILLA (CON ROLES Y PINES)
 * ==========================================
 */
const SEED_DATA = {
    cuentas: [
        { id: 1, nombre: 'Banco Agrario Principal', tipo: 'banco', saldoInicial: 10000000, numero: '123-456-789' }
    ],
    transacciones: [],
    viajes: [
        { id: 1, fecha: '2025-10-25', viaje: 'Viaje #1', periodo: 'Octubre 2025', ruta: 'B/tura - Satinga', ingreso: 66956000, gastos: 29107000, utilidadBruta: 37849000, cartera: 12411000, ingresoRecaudado: 54545000, observaciones: 'Madera bajada Satinga', clientesAsociados: 'Oscar, Pepe', productos: 'Madera Aserrada', pagoFlete: 54545000, pagoCargue: 2000000 }
    ],
    clientesDir: [
        { id: 2, nombre: 'Oscar', tipo: 'Comerciante de Madera', segmento: 'Persona Común', nit: '222222222', telefono: '3120000000', ubicacion: 'Satinga' }
    ],
    socios: [],
    pagosNomina: [],
    usuarios: [
        { id: 1, telefono: '3000000000', rol: 'admin', nombre: 'Admin Principal', pin: '1234' },
        { id: 2, telefono: '3201112233', rol: 'editor', nombre: 'Capitán / Tripulante', pin: '' }
    ]
};

/**
 * ==========================================
 * 4. STATE MANAGEMENT Y ARQUITECTURA
 * ==========================================
 */
const App = {
    state: {
        activeTab: 'dashboard', niifTab: 'estado-situacion', docTab: 'escaner',
        uploadSuccess: false, isFabOpen: false, isSyncingData: false,
        syncQueue: [], 
        userSession: JSON.parse(localStorage.getItem('erp_user_session')) || null, 

        selectedViaje: null, selectedCliente: null, selectedSocio: null,
        isAddViajeOpen: false, isAddClienteOpen: false, isAddNominaOpen: false, isAddSocioOpen: false, isTransferOpen: false, isAddCuentaOpen: false, isAddTransaccionOpen: false, isAddUsuarioOpen: false,
        editingViajeId: null, editingClienteId: null, editingSocioId: null, editingCuentaId: null, editingUsuarioId: null,

        numpad: { isOpen: false, targetField: null, targetLabel: '', targetForm: 'viaje', value: '0' },

        formTemp: {
            viaje: { fecha: '', ruta: '', observaciones: '', productos: '', clientesAsociados: '', ingreso: 0, gastos: 0, cartera: 0, pagoFlete: 0, pagoCargue: 0, cuentaIngresoId: '', cuentaEgresoId: '' },
            cliente: { nombre: '', nit: '', segmento: 'Persona Común', tipo: 'General', telefono: '', ubicacion: '' },
            socio: { nombre: '', porcentaje: 0, inversion: 0, saldoMantenimiento: 0, cuentaId: '' },
            cuenta: { nombre: '', tipo: 'banco', saldoInicial: 0, numero: '' },
            transaccion: { tipo: 'ingreso', monto: 0, fecha: new Date().toISOString().split('T')[0], concepto: '', cuentaId: '', cuentaDestinoId: '' },
            usuario: { telefono: '', rol: 'editor', nombre: '', pin: '' }
        },

        config: {
            pdfIncludes: { balance: true, resultados: true, flujo: true, patrimonio: true, socios: true },
            ui: { isDark: false, bgColor: '#f8fafc', textColor: '#1e293b', textSize: 'normal' }
        },

        cuentas: JSON.parse(JSON.stringify(SEED_DATA.cuentas)), 
        transacciones: JSON.parse(JSON.stringify(SEED_DATA.transacciones)), 
        viajes: JSON.parse(JSON.stringify(SEED_DATA.viajes)), 
        clientesDir: JSON.parse(JSON.stringify(SEED_DATA.clientesDir)), 
        socios: JSON.parse(JSON.stringify(SEED_DATA.socios)), 
        pagosNomina: JSON.parse(JSON.stringify(SEED_DATA.pagosNomina)),
        usuarios: JSON.parse(JSON.stringify(SEED_DATA.usuarios)),
        
        nominaBase: [{ id: 1, cargo: 'Capitán', valorDia: 190000, diasDefault: 5 }]
    },

    navItems: [
        { id: 'dashboard', label: 'Inicio', icon: 'trending-up', roles: ['admin', 'editor', 'cliente'] },
        { id: 'viajes', label: 'Viajes', icon: 'ship', roles: ['admin', 'editor', 'cliente'] },
        { id: 'cartera', label: 'Cartera', icon: 'wallet', roles: ['admin', 'editor', 'cliente'] },
        { id: 'tesoreria', label: 'Cajas/Bancos', icon: 'wallet-cards', roles: ['admin'] },
        { id: 'finanzas', label: 'NIIF', icon: 'landmark', roles: ['admin'] },
        { id: 'nomina', label: 'Nómina', icon: 'users', roles: ['admin'] },
        { id: 'sociedad', label: 'Sociedad', icon: 'anchor', roles: ['admin'] },
        { id: 'clientes', label: 'Clientes', icon: 'contact', roles: ['admin', 'editor'] },
        { id: 'documentos', label: 'Archivos', icon: 'file-scan', roles: ['admin', 'editor'] },
        { id: 'config', label: 'Ajustes', icon: 'settings', roles: ['admin'] }
    ],

    // MÉTODOS DE AUTENTICACIÓN
    handleLogin: (e) => {
        e.preventDefault();
        const f = e.target; 
        const phone = f.telefono.value.trim().replace(/\s+/g, '');
        const inputPin = f.pin.value.trim();
        
        let user = App.state.usuarios.find(u => u.telefono === phone);
        
        if (!user) {
            const cliente = App.state.clientesDir.find(c => c.telefono.replace(/\s+/g, '') === phone);
            if (cliente) {
                user = { id: `c-${cliente.id}`, telefono: phone, rol: 'cliente', nombre: cliente.nombre };
            }
        }

        if (user) {
            // VERIFICACIÓN DE PIN SOLO PARA ADMINISTRADOR
            if (user.rol === 'admin') {
                if (user.pin && user.pin !== inputPin) {
                    alert("Acceso Denegado. El PIN de administrador es incorrecto.");
                    return;
                } else if (!user.pin && inputPin !== '1234' && inputPin !== '') {
                    // Fallback de seguridad si el admin perdió su PIN en la BD
                    alert("Acceso Denegado. PIN incorrecto.");
                    return;
                }
            }

            App.state.userSession = user;
            localStorage.setItem('erp_user_session', JSON.stringify(user));
            App.state.activeTab = 'dashboard';
            App.render();
        } else {
            alert("Acceso Denegado. Teléfono no registrado en la base de datos.");
        }
    },
    handleLogout: () => {
        App.state.userSession = null;
        localStorage.removeItem('erp_user_session');
        App.render();
    },

    canEdit: () => {
        const r = App.state.userSession?.rol;
        return r === 'admin' || r === 'editor';
    },
    isAdmin: () => App.state.userSession?.rol === 'admin',

    getViajesSegunRol: () => {
        const s = App.state;
        if (s.userSession?.rol === 'cliente') {
            return s.viajes.filter(v => window.exactMatch(v.clientesAsociados, s.userSession.nombre));
        }
        return s.viajes;
    },

    setTab: (tab) => { App.state.activeTab = tab; App.state.isFabOpen = false; App.render(); },
    setFilterVal: (key, val) => { App.state[key] = val; App.render(); },
    
    autoSyncDaemon: async () => {
        if (!window.isFirebaseReady || !currentUser || !navigator.onLine || App.state.syncQueue.length === 0) return;
        App.state.isSyncingData = true; App.render();
        const queueCopy = [...App.state.syncQueue];
        App.state.syncQueue = []; 
        for (let task of queueCopy) {
            try { await setDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', task.colName, task.id.toString()), task.data, { merge: true }); } 
            catch(e) { if(!App.state.syncQueue.find(x => x.colName === task.colName && x.id === task.id)) App.state.syncQueue.push(task); }
        }
        App.state.lastSyncTime = new Date(); App.state.isSyncingData = false; App.render();
    },
    syncToCloud: async () => {
        if (!window.isFirebaseReady || !currentUser) { alert("Modo Offline."); return; }
        await App.autoSyncDaemon();
        if (App.state.syncQueue.length === 0) alert("Guardado Exitoso.");
    },

    applyTheme: () => {
        const ui = App.state.config.ui; const root = document.documentElement;
        if(ui.textSize === 'small') root.style.fontSize = '14px'; else if(ui.textSize === 'large') root.style.fontSize = '18px'; else root.style.fontSize = '16px';
        let styleTag = document.getElementById('dynamic-theme');
        if(!styleTag) { styleTag = document.createElement('style'); styleTag.id = 'dynamic-theme'; document.head.appendChild(styleTag); }
        if(ui.isDark) {
            styleTag.innerHTML = `body, main, .bg-slate-50 { background-color: #0f172a !important; color: #f8fafc !important; } .bg-white { background-color: #1e293b !important; border-color: #334155 !important; } .text-slate-800, .text-slate-900 { color: #f8fafc !important; } .text-slate-700, .text-slate-600 { color: #cbd5e1 !important; } .text-slate-500, .text-slate-400 { color: #94a3b8 !important; } .border-slate-100, .border-slate-200, .border-slate-300 { border-color: #334155 !important; } header, select, input, textarea { background-color: #0f172a !important; color: #f8fafc !important; border-color: #334155 !important; } table th { background-color: #0f172a !important; color: #f8fafc !important; } .bg-blue-50, .bg-red-50, .bg-green-50, .bg-orange-50, .bg-indigo-50 { background-color: #1e293b !important; border-color: #334155 !important; } .modal-box { background-color: #1e293b !important; color: #f8fafc !important; } @media print { * { color: black !important; background: white !important; } }`;
        } else {
            styleTag.innerHTML = `body, main { background-color: ${ui.bgColor} !important; color: ${ui.textColor} !important; }`;
        }
    },
    
    openNumpad: (targetField, label, formTarget = 'viaje') => { App.state.numpad.isOpen = true; App.state.numpad.targetField = targetField; App.state.numpad.targetLabel = label; App.state.numpad.targetForm = formTarget; App.state.numpad.value = App.state.formTemp[formTarget][targetField] ? App.state.formTemp[formTarget][targetField].toString() : '0'; App.render(); },
    handleNumpadClick: (key) => {
        let val = App.state.numpad.value;
        if(key === 'DEL') val = val.length > 1 ? val.slice(0, -1) : '0'; else if(key === 'CLEAR') val = '0'; 
        else { if(val.length > 12) return; if (val === '0') val = key === '000' ? '0' : key; else val += key; }
        App.state.numpad.value = val; App.state.formTemp[App.state.numpad.targetForm][App.state.numpad.targetField] = parseInt(val, 10); App.render();
    },
    closeNumpad: () => { App.state.numpad.isOpen = false; App.render(); },

    getSaldoCuenta: (cuentaId) => {
        const s = App.state; const cuenta = s.cuentas.find(c => c.id === cuentaId); if(!cuenta) return 0;
        let saldo = cuenta.saldoInicial || 0;
        s.transacciones.filter(t => t.cuentaId === cuentaId).forEach(t => { if(t.tipo === 'ingreso') saldo += t.monto; if(t.tipo === 'egreso') saldo -= t.monto; });
        return saldo;
    },
    getSaldoTotalCuentas: () => App.state.cuentas.reduce((acc, c) => acc + App.getSaldoCuenta(c.id), 0),

    openModalViaje: (id) => { App.state.selectedViaje = App.state.viajes.find(v => v.id === id); App.render(); },
    editViaje: (id) => { const v = App.state.viajes.find(v => v.id === id); if(!v) return; App.state.editingViajeId = id; App.state.formTemp.viaje = { ...v, cuentaIngresoId: '', cuentaEgresoId: '' }; App.state.selectedViaje = null; App.state.isAddViajeOpen = true; App.render(); },
    deleteViaje: async (id, btnElement) => {
        if(btnElement.innerText === 'Eliminar Viaje') { btnElement.innerText = 'Confirmar Borrado'; btnElement.classList.replace('bg-slate-100', 'bg-red-600'); btnElement.classList.replace('text-red-600', 'text-white'); } 
        else { await window.dbHelper.remove('viajes', id); App.closeModals(); }
    },
    submitViaje: async (e) => {
        e.preventDefault(); const f = e.target; const formD = App.state.formTemp.viaje;
        const totalEgresos = formD.gastos + (formD.pagoFlete || 0) + (formD.pagoCargue || 0); const recaudoReal = formD.ingreso - formD.cartera;
        const ctaIngreso = parseInt(f.cuentaIngresoId?.value); const ctaEgreso = parseInt(f.cuentaEgresoId?.value);

        if (!App.state.editingViajeId && App.isAdmin()) { if ((recaudoReal > 0 && !ctaIngreso) || (totalEgresos > 0 && !ctaEgreso)) { alert("Cajas requeridas."); return; } }

        const dateObj = new Date(f.fecha.value + 'T12:00:00Z');
        const mesStr = dateObj.toLocaleString('es-ES', { month: 'long', timeZone: 'UTC' });
        const periodoCalc = f.fecha.value ? `${mesStr.charAt(0).toUpperCase() + mesStr.slice(1)} ${dateObj.getUTCFullYear()}` : 'Nuevo Periodo';

        const viajeData = { fecha: f.fecha.value, ruta: f.ruta.value, ingreso: formD.ingreso, gastos: formD.gastos, cartera: formD.cartera, pagoFlete: formD.pagoFlete, pagoCargue: formD.pagoCargue, productos: f.productos.value, clientesAsociados: f.clientesAsociados.value, observaciones: f.observaciones.value, utilidadBruta: formD.ingreso - formD.gastos, ingresoRecaudado: recaudoReal };
        const newId = App.state.editingViajeId || Date.now();
        const fullData = { id: newId, viaje: App.state.editingViajeId ? App.state.viajes.find(v=>v.id===newId).viaje : `Viaje #${App.state.viajes.length + 1}`, periodo: App.state.editingViajeId ? App.state.viajes.find(v=>v.id===newId).periodo : periodoCalc, ...viajeData };

        await window.dbHelper.save('viajes', newId, fullData);

        if (!App.state.editingViajeId && App.isAdmin()) {
            if (recaudoReal > 0) await window.dbHelper.save('transacciones', Date.now() + 1, { id: Date.now() + 1, cuentaId: ctaIngreso, tipo: 'ingreso', monto: recaudoReal, fecha: f.fecha.value, concepto: `Recaudo Fletes - ${fullData.viaje}`, modulo: 'Viajes', referencia: newId });
            if (totalEgresos > 0) await window.dbHelper.save('transacciones', Date.now() + 2, { id: Date.now() + 2, cuentaId: ctaEgreso, tipo: 'egreso', monto: totalEgresos, fecha: f.fecha.value, concepto: `Costos y Operación - ${fullData.viaje}`, modulo: 'Viajes', referencia: newId });
        }
        App.closeModals();
    },

    submitUsuario: async (e) => {
        e.preventDefault(); const f = e.target;
        const data = { telefono: f.telefono.value.trim(), rol: f.rol.value, nombre: f.nombre.value, pin: f.pin ? f.pin.value.trim() : '' };
        const newId = App.state.editingUsuarioId || Date.now();
        await window.dbHelper.save('usuarios', newId, { id: newId, ...data });
        App.closeModals();
    },
    deleteUsuario: async (id, btnElement) => {
        if(btnElement.innerText === 'Eliminar') { btnElement.innerText = 'Confirmar'; btnElement.classList.replace('bg-slate-100', 'bg-red-600'); btnElement.classList.replace('text-red-600', 'text-white'); } 
        else { await window.dbHelper.remove('usuarios', id); App.closeModals(); }
    },
    editUsuario: (id) => {
        const u = App.state.usuarios.find(x => x.id === id); if(!u) return;
        App.state.editingUsuarioId = id;
        App.state.formTemp.usuario = { ...u };
        App.state.isAddUsuarioOpen = true;
        App.render();
    },

    closeModals: () => { 
        App.state.selectedViaje = null; App.state.selectedCliente = null; App.state.selectedSocio = null;
        App.state.isAddViajeOpen = false; App.state.isAddClienteOpen = false; App.state.isAddNominaOpen = false;
        App.state.isAddSocioOpen = false; App.state.isTransferOpen = false; App.state.isAddCuentaOpen = false; App.state.isAddTransaccionOpen = false; App.state.isAddUsuarioOpen = false;
        App.state.numpad.isOpen = false;
        App.state.editingViajeId = null; App.state.editingClienteId = null; App.state.editingSocioId = null; App.state.editingCuentaId = null; App.state.editingUsuarioId = null;
        
        App.state.formTemp.viaje = { fecha: '', ruta: '', observaciones: '', productos: '', clientesAsociados: '', ingreso: 0, gastos: 0, cartera: 0, pagoFlete: 0, pagoCargue: 0, cuentaIngresoId: '', cuentaEgresoId: '' };
        App.state.formTemp.usuario = { telefono: '', rol: 'editor', nombre: '', pin: '' };
        App.render(); 
    },

    getTotales: () => {
        const viajes = App.getViajesSegunRol();
        const s = App.state;
        const ingresoTotal = viajes.reduce((acc, curr) => acc + Number(curr.ingreso || 0), 0);
        const gastoTotal = viajes.reduce((acc, curr) => acc + Number(curr.gastos || 0), 0);
        const utilidadBruta = viajes.reduce((acc, curr) => acc + Number(curr.utilidadBruta || 0), 0);
        const carteraTotal = viajes.reduce((acc, curr) => acc + Number(curr.cartera || 0), 0); 
        const utilidadNeta = ingresoTotal - gastoTotal; 
        const ingresoRecaudado = viajes.reduce((acc, curr) => acc + Number(curr.ingresoRecaudado || 0), 0);
        const inversionTotal = s.socios.reduce((acc, curr) => acc + Number(curr.inversion || 0), 0);
        const deudaMantenimientoTotal = s.socios.filter(x => x.saldoMantenimiento < 0).reduce((acc, curr) => acc + Math.abs(curr.saldoMantenimiento || 0), 0);
        return { ingresoTotal, gastoTotal, utilidadBruta, carteraTotal, utilidadNeta, ingresoRecaudado, inversionTotal, deudaMantenimientoTotal };
    },

    // VISTAS
    renderLogin: () => `

    render: () => {
        const root = document.getElementById('app-root');
        
        // 🔒 GATEWAY DE SEGURIDAD (Lock Screen)
        if (!App.state.userSession) {
            root.innerHTML = App.renderLogin();
            if (window.lucide) window.lucide.createIcons();
            return;
        }

        // Navegación Filtrada por Roles
        const allowedNavItems = App.navItems.filter(item => item.roles.includes(App.state.userSession.rol));
        
        // Protección de Ruta
        if (!allowedNavItems.find(i => i.id === App.state.activeTab)) {
            App.state.activeTab = 'dashboard';
        }

        let mainContent = '';
        switch(App.state.activeTab) {
            case 'dashboard': mainContent = App.renderDashboard(); break;
            case 'viajes': mainContent = App.renderViajes(); break;
            case 'cartera': mainContent = App.renderCartera(); break; 
            case 'tesoreria': mainContent = App.renderTesoreria ? App.renderTesoreria() : ''; break;
            case 'config': mainContent = App.renderConfig(); break;
            default: mainContent = App.renderDashboard();
        }

        const syncStatusUI = App.state.isSyncingData 
            ? `<i data-lucide="refresh-cw" class="w-3 h-3 mr-2 animate-spin text-blue-400"></i> Guardando...` 
            : (window.isFirebaseReady 
                ? (App.state.syncQueue.length > 0 
                    ? `<div class="w-2 h-2 bg-orange-400 animate-pulse rounded-full mr-2"></div> Pendientes: ${App.state.syncQueue.length}` 
                    : `<div class="w-2 h-2 bg-green-400 rounded-full mr-2"></div> Auto-Guardado ON`) 
                : `<div class="w-2 h-2 bg-red-400 rounded-full mr-2"></div> Offline`);

        root.innerHTML = `
            ${App.renderModals()}
            
            <header class="bg-white border-b border-slate-200 p-4 flex justify-between items-center z-10 shrink-0 print:hidden shadow-sm sticky top-0">
                <div class="flex items-center">
                    <h1 onclick="window.App.setTab('dashboard')" class="text-lg sm:text-xl font-black text-slate-800 flex items-center tracking-tight cursor-pointer hover:text-blue-600 transition-colors"><i data-lucide="anchor" class="mr-2 text-blue-600 w-5 h-5 sm:w-6 sm:h-6"></i> Don Sebe</h1>
                </div>
                <div class="flex space-x-2">
                    <div class="bg-slate-900 text-white px-3 py-1.5 rounded-full text-[10px] sm:text-xs font-bold shadow-md flex items-center transition-all min-w-[120px] justify-center">${syncStatusUI}</div>
                    <button onclick="window.App.handleLogout()" class="bg-red-50 text-red-600 p-1.5 rounded-full hover:bg-red-100 transition-colors"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                </div>
            </header>

            <div class="flex flex-1 overflow-hidden w-full h-full relative">
                <aside class="hidden lg:flex flex-col w-64 bg-white border-r border-slate-200 overflow-y-auto shrink-0 shadow z-10">
                    <nav class="p-4 space-y-1.5 pt-6">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 px-2">Menú de ${App.state.userSession.rol}</p>
                        ${allowedNavItems.map(item => `
                            <button onclick="window.App.setTab('${item.id}')" class="w-full flex items-center p-3 rounded-xl transition-all ${App.state.activeTab === item.id ? 'bg-blue-50 text-blue-700 font-bold border border-blue-100 shadow-sm' : 'text-slate-600 hover:bg-slate-50 border border-transparent'}">
                                <i data-lucide="${item.icon}" class="w-5 h-5 mr-3 ${App.state.activeTab === item.id ? 'text-blue-600' : 'text-slate-400'}"></i> ${item.label}
                            </button>
                        `).join('')}
                    </nav>
                </aside>
                
                <main class="flex-1 overflow-y-auto p-4 md:p-6 pb-28 lg:pb-8 bg-slate-50 print:bg-white print:p-0">
                    <div class="max-w-6xl mx-auto">${mainContent}</div>
                </main>
            </div>

            <!-- Bottom Navigation Móvil -->
            <nav class="lg:hidden bg-white/95 backdrop-blur-md border-t border-slate-200 flex justify-start sm:justify-center overflow-x-auto hide-scroll pb-safe pt-2 px-2 z-50 w-full fixed bottom-0 left-0 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.08)]">
                ${allowedNavItems.map(item => `
                    <button onclick="window.App.setTab('${item.id}')" class="flex flex-col items-center justify-center p-2 min-w-[72px] sm:min-w-[80px] rounded-xl transition-colors ${App.state.activeTab === item.id ? 'text-blue-700 font-bold bg-blue-50/80 shadow-inner' : 'text-slate-500 hover:bg-slate-50'}">
                        <i data-lucide="${item.icon}" class="w-5 h-5 mb-1 ${App.state.activeTab === item.id ? 'text-blue-600 scale-110' : ''}"></i>
                        <span class="text-[10px] whitespace-nowrap">${item.label}</span>
                    </button>
                `).join('')}
            </nav>

            <!-- FAB Botón Flotante (Solo Admins y Editores) -->
            ${App.canEdit() ? `
            <div class="fixed bottom-20 lg:bottom-6 right-4 lg:right-6 z-[55] print:hidden flex flex-col items-end space-y-3">
                ${App.state.isFabOpen ? `
                    <button onclick="window.App.state.isAddViajeOpen=true; window.App.state.editingViajeId=null; window.App.state.isFabOpen=false; window.App.render()" class="bg-blue-600 text-white p-3.5 rounded-full shadow-lg hover:bg-blue-700 flex items-center animate-fade-in transition-transform hover:scale-105"><span class="mr-3 font-bold text-xs bg-slate-800 px-2 py-1 rounded shadow">Nuevo Viaje</span><i data-lucide="ship" class="w-5 h-5"></i></button>
                    ${App.isAdmin() ? `<button onclick="window.App.state.isAddTransaccionOpen=true; window.App.state.isFabOpen=false; window.App.render()" class="bg-indigo-600 text-white p-3.5 rounded-full shadow-lg hover:bg-indigo-700 flex items-center animate-fade-in transition-transform hover:scale-105"><span class="mr-3 font-bold text-xs bg-slate-800 px-2 py-1 rounded shadow">Movimiento Caja</span><i data-lucide="arrow-right-left" class="w-5 h-5"></i></button>` : ''}
                ` : ''}
                <button onclick="window.App.state.isFabOpen = !window.App.state.isFabOpen; window.App.render()" class="bg-slate-900 text-white p-4 rounded-full shadow-2xl hover:bg-slate-800 active:scale-95 transition-transform">
                    <i data-lucide="${App.state.isFabOpen ? 'x' : 'plus'}" class="w-6 h-6 transition-transform ${App.state.isFabOpen ? 'rotate-90' : ''}"></i>
                </button>
            </div>` : ''}
        `;

        if (window.lucide) window.lucide.createIcons();
    }
};

window.App = App;

// Inicialización
window.onload = () => {
    window.App.applyTheme();
    window.App.render();
    
    setInterval(() => { window.App.autoSyncDaemon(); }, 45000);
    window.addEventListener('online', window.App.autoSyncDaemon);

    if (window.isFirebaseReady) {
        
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Error Auth Firebase:", err);
            }
        };

        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                window.activeFirebaseListeners.forEach(unsub => unsub()); 
                window.activeFirebaseListeners = [];

                const colecciones = ['cuentas', 'transacciones', 'viajes', 'clientesDir', 'socios', 'pagosNomina', 'usuarios'];
                
                colecciones.forEach(col => {
                    const colRef = collection(db, 'artifacts', appIdStr, 'public', 'data', col);
                    const unsub = onSnapshot(colRef, (snapshot) => {
                        const data = snapshot.docs.map(d => d.data());
                        if (data.length > 0) { 
                            window.App.state[col] = data; 
                            window.hasLoadedFromCloud[col] = true;
                        } else if (window.hasLoadedFromCloud[col]) {
                            window.App.state[col] = []; 
                        }
                        window.App.render(); 
                    });
                    window.activeFirebaseListeners.push(unsub);
                });
            }
        });
    }
};
</script>
</body>
</html>
